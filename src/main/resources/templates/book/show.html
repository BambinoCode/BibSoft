<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8">
		
		
		<link href="bootstrap-5.3.8-dist\css\bootstrap.min.css" rel="stylesheet">
		<script src="bootstrap-5.3.8-dist\js\bootstrap.bundle.min.js"></script>
		
		
		<title>Show Book</title>
	</head>
	<body>
		<p th:text="${greeting}"/>
		<h1 th:text="${titel}"/>
		
		<div th:if="${not #lists.isEmpty(book)}">
			<div>
				<label for="id">Id: </label>
				<input id="id" type="text" th:text="${book.id}"/>
			</div>
			
			<div>
				<label for="speicherort">Speicherort: </label>
				<input id="speicherort" type="text" th:text="${book.speicherort}"/>
			</div>
			
			<div>
				<label> Dateiname: </label>
				<input id="dateiname" type="text" placeholder = "Dateiname" th:text="${book.dateiname}"/>
			</div>
			
			<div>
				<label> Dateiendung: </label>
				<input id="dateiendung" type="text" placeholder = "Dateiendung" th:text="${book.dateiendung}"/>
			</div>
		</div>

	</body>
</html>
