<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">
	<head>
	

		<link href="bootstrap-5.3.8-dist\css\bootstrap.min.css" rel="stylesheet">
		<script src="bootstrap-5.3.8-dist\js\bootstrap.bundle.min.js"></script>
	
	    <title>Getting Started: Handling Form Submission</title>
	    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	</head>
	<body>
		
		<div id="Header">
		<ul>
			<li><a th:href="/index">Main</a></li>
			<li><a th:href="">Bücher</a></li>
			<li><a th:href="">Kunden</a></li>
			<li><a th:href="">Rechnungen</a></li>
		</ul>
		</div>
		
		<div id="menue">
		</div>
		
		<div id="container">
			<h1>Form</h1>
			<p th:text="${greeting}"/>
			<p th:text="${count}"/>
			<p th:text="${Dateiendung}"/>
			<p th:text="${Speicherort}"/>
			
			<table class="table table-striped table-hover">
				<thead>
					<tr>
						<th>ID</th>
						<th>speicherort</th>
						<th>Dateiname</th>
						<th>Dateiendung</th>
						
						<th>Anzeigen</th>
						<th>Bearbeiten</th>
						<th>Löschen</th>
					</tr>
				</thead>
				
				<tbody th:if="${not #lists.isEmpty(books)}">
				<tbody>
					<tr>
						<td><a href="/book/new">Neues Buch</a></td>
					</tr>
					
					<tr th:each="book : ${books}">
						<td th:text="${book.id}">ID</td>
						<td th:text="${book.speicherort}">Speicherort</td>
						<td th:text="${book.dateiname}">Dateiname</td>
						<td th:text="${book.dateiendung}">Dateiendung</td>
						
						<td><a th:href="@{/book/show/{id}(id=${book.id})}">Anzeigen</a></td>
						<td><a th:href="@{/book/edit/{id}(id=${book.id})}">Bearbeiten</a></td>
						<td><a th:href="@{/book/delete/{id}(id=${book.id})}">Löschen</a></td>
					</tr>
					
					<tr>
						<td><a href="/">Neues Buch</a></td>
					</tr>
				</tbody>
			</table>
		</div>
	</body>
</html>
